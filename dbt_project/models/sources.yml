# =============================================================================
# Source Declaration — tells dbt about tables that exist OUTSIDE of dbt
# =============================================================================
# dbt only knows about tables it creates (models) or loads (seeds).
# Our raw_pyusd_transfers table was loaded by the Python ETL script,
# so we must explicitly declare it here as a "source" for dbt to use.

version: 2

sources:
  - name: pyusd                          # Logical grouping name (used in {{ source('pyusd', 'raw_pyusd_transfers') }})
    schema: main                          # Table lives in DuckDB's 'main' schema, not a schema called 'pyusd'
    description: "Raw PYUSD transfer events loaded from decoded Etherscan logs"
    tables:
      - name: raw_pyusd_transfers        # Must match the exact table name in DuckDB
        description: "Decoded ERC-20 Transfer events for PYUSD contract"
        columns:
          - name: block_number
            description: "Ethereum block number"
          - name: timestamp
            description: "UTC datetime of the block"
          - name: transfer_date
            description: "Date extracted from timestamp"
          - name: tx_hash
            description: "Transaction hash"
          - name: log_index
            description: "Log position within the block"
          - name: from_address
            description: "Sender address (0x0 = mint)"
          - name: to_address
            description: "Receiver address (0x0 = burn)"
          - name: amount
            description: "PYUSD amount (human-readable, 6 decimals applied)"
          - name: is_mint
            description: "True if from_address is the zero address"
          - name: is_burn
            description: "True if to_address is the zero address"
